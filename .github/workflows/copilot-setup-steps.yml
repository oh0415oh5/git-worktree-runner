name: "Copilot Setup Steps"

# Automatically run the setup steps when they are changed to allow for easy validation, and
# allow manual testing through the repository's "Actions" tab
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install ShellCheck and BATS
        run: sudo apt-get update && sudo apt-get install -y shellcheck bats

      - name: Disable commit signing
        # The cloud git environment enables ssh commit signing by default. The signing
        # helper blocks indefinitely in the sandbox, which causes `bats tests/` to hang
        # silently because the integration tests run `git commit` in disposable repos.
        run: git config --global commit.gpgsign false
